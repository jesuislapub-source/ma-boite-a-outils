%%html
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Boîte à Outils Interactive</title>
    <style>
        /* --- STYLE GENERAL --- */
        .app-container {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 12px;
        }

        .app-container h1 { color: #cba6f7; margin-top: 0; }
        .app-container h2, .app-container h3 { color: #89b4fa; }

        .navbar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background-color: #313244;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            justify-content: center;
        }

        .nav-btn {
            background-color: #45475a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .nav-btn:hover { background-color: #89b4fa; color: #11111b; }
        .nav-btn.active { background-color: #cba6f7; color: #11111b; }

        .app-section {
            display: none;
            background-color: #313244;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        .app-section.active { display: block; }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: none;
            box-sizing: border-box;
            font-size: 16px;
        }
        input { background-color: #45475a; color: white; }
        
        .action-btn { background-color: #a6e3a1; color: #11111b; font-weight: bold; cursor: pointer; }
        .action-btn:hover { background-color: #94e2d5; }
        .secondary-btn { background-color: #89b4fa; color: #11111b; font-weight: bold; cursor: pointer; }

        /* --- SÉLECTEUR & ROUE --- */
        .input-tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background-color: #45475a;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            min-height: 45px;
        }
        .tag {
            background-color: #cba6f7;
            color: #11111b;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tag .remove-btn { cursor: pointer; color: #f38ba8; font-weight: bold; }
        
        .roue-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }
        #canvas-roue { border-radius: 50%; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        
        .fleche {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #f38ba8;
            z-index: 10;
        }
        #resultat-selecteur {
            font-size: 22px;
            font-weight: bold;
            color: #f9e2af;
            text-align: center;
            margin-top: 15px;
        }

        /* --- FLASHCARDS --- */
        .zone-flashcard {
            background-color: #45475a;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-top: 15px;
            border: 2px dashed #cba6f7;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🧰 Ma Boîte à Outils</h1>

    <audio id="son-tic" src="tic.mp3" preload="auto"></audio>
    <audio id="son-victoire" src="victoire.mp3" preload="auto"></audio>

    <div class="navbar">
        <button class="nav-btn active" onclick="changerOngletNotebook('selecteur')">🎲 Roue de la Fortune</button>
        <button class="nav-btn" onclick="changerOngletNotebook('flashcards')">🃏 Flashcards</button>
    </div>

    <div id="selecteur" class="app-section active">
        <h2>🎲 Roue de la Fortune</h2>
        <p>Ajoute tes options une par une (Appuie sur <strong>Entrée</strong>) :</p>
        
        <input type="text" id="item-input" placeholder="Ex: Pizza, Cinéma, Révisez...">
        
        <div class="input-tags-container" id="tags-liste"></div>

        <button class="action-btn" id="spin-button" onclick="lancerLaRoue()">Tourner la roue !</button>

        <div class="roue-wrapper">
            <div class="fleche"></div>
            <canvas id="canvas-roue" width="300" height="300"></canvas>
        </div>

        <div id="resultat-selecteur"></div>
    </div>

    <div id="flashcards" class="app-section">
        <h2>🃏 Créateur de Flashcards</h2>
        <div style="border-bottom: 1px solid #45475a; padding-bottom: 15px; margin-bottom: 15px;">
            <h3>Ajouter une carte</h3>
            <input type="text" id="fc-question" placeholder="Question...">
            <input type="text" id="fc-reponse" placeholder="Réponse...">
            <button class="secondary-btn" onclick="ajouterFlashcardNotebook()">Enregistrer la carte</button>
            <p id="fc-compteur" style="font-size: 14px; color: #a6adc8; margin: 0;">0 carte enregistrée</p>
        </div>

        <h3>Zone de Révision</h3>
        <button class="action-btn" onclick="pigerCarteNotebook()">Afficher une carte au hasard</button>
        <div id="ecran-flashcard" class="zone-flashcard" onclick="retournerCarteNotebook()" style="display: none;"></div>
    </div>
</div>

<script>
    function changerOngletNotebook(idSection) {
        let sections = document.querySelectorAll('.app-section');
        sections.forEach(sec => sec.classList.remove('active'));
        let boutons = document.querySelectorAll('.nav-btn');
        boutons.forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(idSection).classList.add('active');
        event.currentTarget.classList.add('active');
        
        if(idSection === 'selecteur') dessinerRoue();
    }

    // ==========================================
    // LOGIQUE DE LA ROUE CORRIGÉE & SONORE
    // ==========================================
    let listeMots = ["kebab", "pizza", "drole", "manger"]; 
    const canvas = document.getElementById('canvas-roue');
    const ctx = canvas.getContext('2d');
    
    let angleActuel = 0;
    let enAnimation = false;
    const couleurs = ["#f38ba8", "#fab387", "#f9e2af", "#a6e3a1", "#94e2d5", "#89b4fa", "#b4befe", "#cba6f7"];

    // Récupération des éléments audio
    const sonTic = document.getElementById('son-tic');
    const sonVictoire = document.getElementById('son-victoire');

    document.getElementById('item-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' || e.keyCode === 13) {
            let mot = this.value.trim();
            if (mot !== "") {
                listeMots.push(mot);
                this.value = "";
                mettreAJourTags();
                dessinerRoue();
            }
        }
    });

    function mettreAJourTags() {
        const container = document.getElementById('tags-liste');
        container.innerHTML = "";
        listeMots.forEach((mot, index) => {
            let tag = document.createElement('div');
            tag.className = 'tag';
            tag.innerHTML = `${mot} <span class="remove-btn" onclick="supprimerMot(${index})">×</span>`;
            container.appendChild(tag);
        });
    }

    function supprimerMot(index) {
        listeMots.splice(index, 1);
        mettreAJourTags();
        dessinerRoue();
    }

    function dessinerRoue() {
        const nbSegments = listeMots.length;
        const centre = canvas.width / 2;
        const rayon = centre - 5;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (nbSegments === 0) {
            ctx.fillStyle = "#45475a";
            ctx.beginPath();
            ctx.arc(centre, centre, rayon, 0, 2 * Math.PI);
            ctx.fill();
            return;
        }

        const tailleSegment = (2 * Math.PI) / nbSegments;

        for (let i = 0; i < nbSegments; i++) {
            const angleDebut = angleActuel + (i * tailleSegment);
            const angleFin = angleDebut + tailleSegment;

            // 1. Dessin du segment de couleur
            ctx.fillStyle = couleurs[i % couleurs.length];
            ctx.beginPath();
            ctx.moveTo(centre, centre);
            ctx.arc(centre, centre, rayon, angleDebut, angleFin);
            ctx.closePath();
            ctx.fill();

            // 2. Écriture du texte CORRIGÉ (Toujours lisible sans pencher la tête)
            ctx.save();
            ctx.translate(centre, centre);
            
            // Calcul de l'angle du milieu du segment actuel
            let angleMilieu = angleDebut + tailleSegment / 2;
            ctx.rotate(angleMilieu);

            ctx.fillStyle = "#11111b";
            ctx.font = "bold 14px Segoe UI";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // CORRECTION SENS DU TEXTE : Si l'écriture se retrouve à l'envers (zone gauche de la roue), on pivote de 180°
            let angleNormalise = (angleMilieu + Math.PI / 2) % (2 * Math.PI);
            if (angleNormalise > Math.PI) {
                ctx.translate(rayon / 2, 0);
                ctx.rotate(Math.PI);
                ctx.fillText(listeMots[i], 0, 0);
            } else {
                ctx.fillText(listeMots[i], rayon / 2, 0);
            }
            
            ctx.restore();
        }
    }

    function lancerLaRoue() {
        if (enAnimation || listeMots.length === 0) return;
        enAnimation = true;
        document.getElementById('resultat-selecteur').innerHTML = "La roue tourne... 🎡";

        const nbSegments = listeMots.length;
        const tailleSegment = (2 * Math.PI) / nbSegments;
        
        const indexGagnant = Math.floor(Math.random() * nbSegments);
        const angleCibleSegment = 3 * Math.PI / 2 - (indexGagnant * tailleSegment) - (tailleSegment / 2);
        const rotationTotale = angleCibleSegment + (Math.PI * 2 * (5 + Math.floor(Math.random() * 3)));
        
        let vitesse = 0.4; 
        let dernierAngleSegment = Math.floor(angleActuel / tailleSegment);

        function animer() {
            if (vitesse > 0.002) {
                vitesse *= 0.98; 
                angleActuel += vitesse;

                // --- GESTION DU SON DE TIC-TIC ---
                // Dès qu'on change de segment pendant la rotation, on joue le son court
                let segmentActuel = Math.floor(angleActuel / tailleSegment);
                if (segmentActuel !== dernierAngleSegment) {
                    sonTic.currentTime = 0; // Remet le son au début
                    sonTic.play().catch(() => {}); // .catch empêche les erreurs de sécurité du navigateur
                    dernierAngleSegment = segmentActuel;
                }

                dessinerRoue();
                requestAnimationFrame(animer);
            } else {
                enAnimation = false;
                
                // --- GESTION DU SON DE VICTOIRE ---
                sonVictoire.currentTime = 0;
                sonVictoire.play().catch(() => {});

                document.getElementById('resultat-selecteur').innerHTML = "✨ Résultat : " + listeMots[indexGagnant];
            }
        }
        animer();
    }

    mettreAJourTags();
    dessinerRoue();

    // ==========================================
    // LOGIQUE DES FLASHCARDS
    // ==========================================
    let baseCartes = [];
    let carteEnCours = null;
    let vueReponse = false;

    function ajouterFlashcardNotebook() {
        let q = document.getElementById('fc-question').value.trim();
        let r = document.getElementById('fc-reponse').value.trim();
        if (q === "" || r === "") return;

        baseCartes.push({ question: q, reponse: r });
        document.getElementById('fc-question').value = "";
        document.getElementById('fc-reponse').value = "";
        document.getElementById('fc-compteur').innerHTML = baseCartes.length + " carte(s) enregistrée(s)";
    }

    function pigerCarteNotebook() {
        if (baseCartes.length === 0) return;
        let idx = Math.floor(Math.random() * baseCartes.length);
        carteEnCours = baseCartes[idx];
        
        let ecran = document.getElementById('ecran-flashcard');
        ecran.style.display = "flex";
        ecran.style.color = "#cba6f7";
        ecran.innerHTML = carteEnCours.question;
        vueReponse = false;
    }

    function retournerCarteNotebook() {
        if (!carteEnCours) return;
        let ecran = document.getElementById('ecran-flashcard');
        if (!vueReponse) {
            ecran.innerHTML = carteEnCours.reponse;
            ecran.style.color = "#a6e3a1";
            vueReponse = true;
        } else {
            ecran.innerHTML = carteEnCours.question;
            ecran.style.color = "#cba6f7";
            vueReponse = false;
        }
    }
</script>
</body>
</html>
